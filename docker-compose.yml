# SAMI / Southbrook AI Kitchen Platform — local dev compose.
#
# Brings up Odoo 19 CE + Postgres 16 + the FreeCAD bridge skeleton with the
# full southbrook-v19cr addons tree mounted (custom addons + OCA configurator).
#
# Quick start:
#   cp .env.example .env       # then edit secrets
#   docker compose up -d
#   open http://localhost:8169  # Odoo login (db: southbrook)
#   curl http://localhost:8001/health  # FreeCAD bridge health
#
# Port note: Odoo defaults to 8169/8172 (not the canonical 8069/8072) to
# coexist with the OCA-only dev clone at ~/Downloads/Official/V19C/ which
# already binds 8069/8072. Override via ODOO_HTTP_PORT / ODOO_LONGPOLLING_PORT
# in .env if you stop V19C.
#
# The existing addons/ tree is mounted directly into the Odoo container so
# in-flight Phase work (configurator-attribute audit etc.) keeps working
# without a rebuild.

services:
  db:
    image: postgres:16-alpine
    container_name: sami-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-southbrook}
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo} -d ${POSTGRES_DB:-southbrook}"]
      interval: 5s
      timeout: 5s
      retries: 10

  odoo:
    build:
      context: ./services/odoo
      dockerfile: Dockerfile
    image: sami-odoo:dev
    container_name: sami-odoo
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: ${POSTGRES_USER:-odoo}
      PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      # shared/southbrook_dims.py is the canonical 7-panel formula source.
      # Mounted at /srv/shared and exposed via PYTHONPATH so Odoo addons +
      # test_bom_contents.py (G1) can `from southbrook_dims import ...`.
      PYTHONPATH: /srv/shared
    ports:
      - "${ODOO_HTTP_PORT:-8169}:8069"
      - "${ODOO_LONGPOLLING_PORT:-8172}:8072"   # longpolling / websocket
    volumes:
      - ./addons:/mnt/extra-addons:ro
      - ./shared:/srv/shared:ro
      - odoo-data:/var/lib/odoo
    restart: unless-stopped
    # Override the default cmd to point at our addons dir.
    # The master-admin password is set in odoo.conf, not via CLI (no such
    # Odoo flag exists). Configure inside the running container after init,
    # or mount a config file at /etc/odoo/odoo.conf.
    command: >
      odoo
      --addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
      --database=${ODOO_DB:-southbrook}
      --db_host=db
      --db_user=${POSTGRES_USER:-odoo}
      --db_password=${POSTGRES_PASSWORD}

  freecad-bridge:
    build:
      context: ./services/freecad_bridge
      dockerfile: Dockerfile
    container_name: sami-freecad-bridge
    environment:
      FREECAD_BRIDGE_SECRET: ${FREECAD_BRIDGE_SECRET:?FREECAD_BRIDGE_SECRET must be set in .env}
    ports:
      - "8001:8000"
    restart: unless-stopped
    # Module 0 placeholder — only /health is implemented. Module 2 fills in
    # /render /status /validate /templates and the FreeCAD runtime.

volumes:
  postgres-data:
  odoo-data:
