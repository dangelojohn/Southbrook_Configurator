<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Southbrook Kitchen — review your project, upload a kitchen photo, pick a concept, approve the design.">
  <meta name="theme-color" content="#1E3A5F">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Southbrook Kitchen">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Southbrook Kitchen</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    Custom bootstrap forces the HTML renderer (default CanvasKit paints
    everything to canvas — no DOM, no a11y tree, no semantic content for
    screen readers or automated testing). The {{flutter_js}} and
    {{flutter_build_config}} tokens are filled in by `flutter build web`;
    the loader.load() call replaces the autogenerated flutter_bootstrap.js
    entry point.

    https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    {{flutter_js}}
    {{flutter_build_config}}
    _flutter.loader.load({
      config: {
        renderer: "html",
      },
    });
  </script>
</body>
</html>
