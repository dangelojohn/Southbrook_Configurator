<?xml version="1.0" encoding="UTF-8"?>
<!--
  Southbrook Estimating — addon icon (placeholder SVG).

  Apps Store submission requires a 128x128 PNG at this path
  (replace .svg with .png). The SVG below is a stand-in for that
  conversion. When SIGNATURE_SERIES_TOKENS.md lands, the colour palette
  here updates to the canonical Sky / Walnut / Linen hex values.

  To convert to PNG before submission:
    rsvg-convert -w 128 -h 128 icon.svg > icon.png
  or use ImageMagick / Inkscape.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="128" height="128" viewBox="0 0 128 128"
     role="img" aria-label="Southbrook Estimating">
  <defs>
    <!-- TBD palette tokens, mirroring NF15 named CSS variables -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8F4EC"/>     <!-- TBD linen -->
      <stop offset="1" stop-color="#C8D9E0"/>     <!-- TBD sky -->
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="16" fill="url(#bg)"/>

  <!-- Stylised cabinet: 3-panel base unit -->
  <g stroke="#5C4033" stroke-width="3" fill="#FFFFFF">  <!-- TBD walnut -->
    <rect x="22" y="32" width="84" height="68" rx="2"/>
    <line x1="64" y1="32" x2="64" y2="100"/>          <!-- centre stile -->
    <circle cx="46" cy="66" r="2.5" fill="#5C4033"/>  <!-- left knob -->
    <circle cx="82" cy="66" r="2.5" fill="#5C4033"/>  <!-- right knob -->
    <line x1="22" y1="100" x2="106" y2="100"/>        <!-- toe-kick rule -->
  </g>

  <!-- Word mark -->
  <text x="64" y="22" font-family="Cardo, 'Times New Roman', serif"
        font-size="11" font-weight="600" text-anchor="middle"
        fill="#2A2A2A">SOUTHBROOK</text>
</svg>
