<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1280" height="720" viewBox="0 0 1280 720"
     role="img" aria-label="Southbrook Estimating banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8F4EC"/>
      <stop offset="1" stop-color="#C8D9E0"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Hero kitchen line: 5 cabinets side by side -->
  <g stroke="#5C4033" stroke-width="3" fill="#FFFFFF">
    <!-- wall_1dr 15 -->
    <rect x="120" y="200" width="140" height="200" rx="2"/>
    <circle cx="200" cy="300" r="3" fill="#5C4033"/>
    <!-- wall_2dr 30 -->
    <rect x="280" y="200" width="220" height="200" rx="2"/>
    <line x1="390" y1="200" x2="390" y2="400"/>
    <circle cx="370" cy="300" r="3" fill="#5C4033"/>
    <circle cx="410" cy="300" r="3" fill="#5C4033"/>
    <!-- base_2dr 33 -->
    <rect x="520" y="380" width="240" height="240" rx="2"/>
    <line x1="640" y1="380" x2="640" y2="620"/>
    <circle cx="620" cy="500" r="3" fill="#5C4033"/>
    <circle cx="660" cy="500" r="3" fill="#5C4033"/>
    <line x1="520" y1="620" x2="760" y2="620"/>  <!-- toe-kick -->
    <!-- tall_pantry 24 -->
    <rect x="780" y="200" width="180" height="420" rx="2"/>
    <circle cx="930" cy="400" r="3" fill="#5C4033"/>
    <line x1="780" y1="620" x2="960" y2="620"/>
    <!-- accessory (end panel) -->
    <rect x="980" y="380" width="60" height="240" rx="2" fill="#EFE6D8"/>
  </g>

  <!-- Title and tagline -->
  <text x="640" y="90" font-family="Cardo, 'Times New Roman', serif"
        font-size="64" font-weight="700" text-anchor="middle"
        fill="#2A2A2A">Southbrook Estimating</text>
  <text x="640" y="140" font-family="Source Sans Pro, Helvetica, sans-serif"
        font-size="26" text-anchor="middle" fill="#5C4033">
    A Prodboard-class kitchen Order Builder on Odoo 19 CE
  </text>

  <!-- Subtle footer line -->
  <text x="640" y="680" font-family="Source Sans Pro, Helvetica, sans-serif"
        font-size="18" text-anchor="middle" fill="#8A8478">
    Multi-zone Order Builder · 6-channel pricelist · Parametric BoM · QWeb reports
  </text>
</svg>
